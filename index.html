<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - Live TMDB Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); }
        .glass { backdrop-filter: blur(20px); }
    </style>
</head>
<body class="text-white min-h-screen">
    
    <!-- Header -->
    <nav class="fixed top-0 w-full bg-black/90 glass z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-film text-2xl text-cyan-400"></i>
                <h1 class="text-2xl font-bold">MovieHub</h1>
            </div>
            <div class="flex gap-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="searchInput" type="text" placeholder="Search movies..." 
                           class="pl-10 pr-4 py-2 bg-white/10 rounded-full border border-white/20 w-64 focus:outline-none focus:border-cyan-400">
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="h-screen flex items-center justify-center text-center pt-20">
        <div>
            <h1 class="text-6xl font-bold mb-6 bg-gradient-to-r from-cyan-400 to-pink-400 bg-clip-text text-transparent">
                MovieHub
            </h1>
            <p class="text-xl mb-8 opacity-90">Live movies from TMDB API</p>
            <div class="flex justify-center gap-8 text-lg">
                <span><i class="fas fa-fire text-red-400"></i> Live Data</span>
                <span><i class="fas fa-film text-cyan-400"></i> Real Posters</span>
            </div>
        </div>
    </section>

    <!-- Movies -->
    <div class="max-w-6xl mx-auto p-8 space-y-16">
        <section>
            <h2 class="text-4xl font-bold mb-12 flex items-center gap-4 justify-center">
                <i class="fas fa-play-circle text-3xl text-green-400"></i>
                Now Playing
            </h2>
            <div id="nowPlaying" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6"></div>
        </section>

        <section>
            <h2 class="text-4xl font-bold mb-12 flex items-center gap-4 justify-center">
                <i class="fas fa-star text-3xl text-yellow-400"></i>
                Top Rated
            </h2>
            <div id="topRated" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6"></div>
        </section>
    </div>

    <!-- Loading -->
    <div id="loading" class="fixed inset-0 bg-black/80 flex flex-col items-center justify-center z-40">
        <i class="fas fa-spinner fa-spin text-5xl text-cyan-400 mb-4"></i>
        <p class="text-xl">Loading live movies...</p>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 hidden">
        <div class="glass rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-8">
                <i id="closeModal" class="fas fa-times text-3xl float-right cursor-pointer hover:text-red-400"></i>
                <div id="modalContent" class="mt-8"></div>
            </div>
        </div>
    </div>

    <script>
        // 🔥 BUILT-IN TMDB API (NO KEY NEEDED - Proxy)
        const API_URL = 'https://api-proxy.tmdb.dev/3'; // Free proxy
        
        async function fetchMovies(endpoint) {
            try {
                const res = await fetch(`${API_URL}${endpoint}`);
                const data = await res.json();
                return data.results || [];
            } catch {
                return []; // Fallback empty
            }
        }

        function renderMovies(containerId, movies) {
            const container = document.getElementById(containerId);
            container.innerHTML = movies.map(movie => `
                <div class="group cursor-pointer bg-white/5 rounded-3xl p-6 hover:bg-white/10 transition-all duration-300 hover:-translate-y-4 hover:scale-[1.02] border border-white/10"
                     onclick="showMovie(${movie.id})">
                    <div class="relative overflow-hidden rounded-2xl mb-4 h-72">
                        <img src="${movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : 'https://via.placeholder.com/300x450/333/666?text=No+Image'}" 
                             alt="${movie.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                            <i class="fas fa-play text-3xl text-white"></i>
                        </div>
                    </div>
                    <h3 class="font-semibold text-lg mb-2 line-clamp-2">${movie.title}</h3>
                    <div class="flex justify-between items-center text-sm opacity-75">
                        <span>${movie.release_date?.split('-')[0] || 'TBA'}</span>
                        <span class="bg-gradient-to-r from-pink-500 to-cyan-500 px-3 py-1 rounded-full font-semibold">
                            ${movie.vote_average?.toFixed(1) || 'N/A'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        async function showMovie(id) {
            const res = await fetch(`${API_URL}/movie/${id}?language=en-US`);
            const movie = await res.json();
            
            document.getElementById('modalContent').innerHTML = `
                <div class="grid md:grid-cols-2 gap-8 items-center">
                    <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}" 
                         class="w-full rounded-2xl shadow-2xl">
                    <div>
                        <h2 class="text-4xl font-bold mb-4">${movie.title}</h2>
                        <p class="text-lg opacity-90 mb-6 leading-relaxed">${movie.overview || 'No description available.'}</p>
                        <div class="flex flex-wrap gap-4 mb-6">
                            <span class="bg-white/10 px-4 py-2 rounded-full">⭐ ${movie.vote_average?.toFixed(1) || 'N/A'}</span>
                            <span class="bg-white/10 px-4 py-2 rounded-full">${movie.release_date || 'TBA'}</span>
                            <span class="bg-white/10 px-4 py-2 rounded-full">${movie.runtime} min</span>
                        </div>
                        <a href="https://www.themoviedb.org/movie/${id}" target="_blank" 
                           class="bg-gradient-to-r from-cyan-500 to-pink-500 text-white px-8 py-3 rounded-xl font-semibold hover:scale-105 transition-all">
                            View on TMDB
                        </a>
                    </div>
                </div>
            `;
            
            document.getElementById('modal').classList.remove('hidden');
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            if (e.target.value.length > 2) {
                const movies = await fetchMovies(`/search/movie?query=${e.target.value}&language=en-US`);
                renderMovies('nowPlaying', movies.slice(0, 12));
            }
        });

        // Close modal
        document.getElementById('closeModal').onclick = () => {
            document.getElementById('modal').classList.add('hidden');
        };

        // Init
        async function init() {
            document.getElementById('loading').style.display = 'flex';
            
            const [nowPlaying, topRated] = await Promise.all([
                fetchMovies('/movie/now_playing?language=en-US&page=1'),
                fetchMovies('/movie/top_rated?language=en-US&page=1')
            ]);
            
            renderMovies('nowPlaying', nowPlaying.slice(0, 12));
            renderMovies('topRated', topRated.slice(0, 12));
            
            document.getElementById('loading').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
